services:
  - type: web
    name: student-economy-platform
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn student_economy.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: student-economy-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: anymail.backends.brevo.EmailBackend
      - key: DEFAULT_FROM_EMAIL
        value: Student Economy Platform <your-verified-sender@gmail.com>
      - key: BREVO_API_KEY
        sync: false

databases:
  - name: student-economy-db
    databaseName: student_economy
    user: student_economy_user
    plan: free
