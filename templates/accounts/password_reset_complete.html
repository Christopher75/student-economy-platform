{% extends 'base.html' %}
{% block title %}Password Changed – Student Economy Platform{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-5 text-center">
      <div class="card border-0 shadow-sm p-5">
        <div class="d-inline-flex align-items-center justify-content-center bg-success-subtle text-success rounded-circle mx-auto mb-4"
             style="width:80px;height:80px;font-size:2.5rem;">
          <i class="bi bi-shield-check-fill"></i>
        </div>
        <h2 class="fw-800 mb-2">Password Changed!</h2>
        <p class="text-muted mb-4">
          Your password has been successfully updated.
          You can now log in with your new password.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary fw-600 px-5 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login Now
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
