{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Change Password - SEP{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="fw-700 mb-1">Change Password</h4>
          <p class="text-muted mb-4">Enter your current password and choose a new one.</p>
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-600">Update Password</button>
          </form>
          <div class="text-center mt-3">
            <a href="{% url 'accounts:dashboard' %}" class="text-muted small">Back to Dashboard</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
