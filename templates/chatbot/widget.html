{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h4>Platform Assistant</h4>
  <p class="text-muted">Ask me anything about the Student Economy Platform.</p>
  <div id="chat-box" style="height:450px;overflow-y:auto;border:1px solid #dee2e6;border-radius:8px;padding:16px;background:#f8f9fa;margin-bottom:12px;"></div>
  <div class="input-group">
    <input id="chat-input" type="text" class="form-control" placeholder="Type your message..." />
    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
  </div>
</div>
<script>
const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${protocol}://${window.location.host}/ws/chatbot/`);
let currentBubble = null;
ws.onmessage = (event) => {
  const data = JSON.parse(event.data);
  if (data.type === 'stream') {
    if (!currentBubble) {
      currentBubble = document.createElement('div');
      currentBubble.style.cssText = 'margin:8px 0;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #dee2e6;max-width:85%;';
      currentBubble.innerHTML = '<strong style="font-size:12px;color:#6c757d;">Assistant</strong><p style="margin:4px 0 0;"></p>';
      document.getElementById('chat-box').appendChild(currentBubble);
    }
    currentBubble.querySelector('p').textContent += data.chunk;
    document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
  } else if (data.type === 'end') {
    currentBubble = null;
  }
};
function sendMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  const div = document.createElement('div');
  div.style.cssText = 'margin:8px 0;padding:10px 14px;background:#0d6efd;color:#fff;border-radius:8px;max-width:85%;margin-left:auto;text-align:right;';
  div.innerHTML = `<strong style="font-size:12px;opacity:0.8;">You</strong><p style="margin:4px 0 0;">${message}</p>`;
  document.getElementById('chat-box').appendChild(div);
  ws.send(JSON.stringify({ message }));
  input.value = '';
}
document.getElementById('chat-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});
</script>
{% endblock %}
