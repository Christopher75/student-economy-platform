{% extends 'base.html' %}
{% block title %}Delete Listing - SEP{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-danger">
        <div class="card-body text-center p-5">
          <i class="bi bi-trash3 text-danger" style="font-size:3rem;"></i>
          <h4 class="mt-3 fw-700">Delete Listing?</h4>
          <p class="text-muted mb-4">
            Are you sure you want to delete <strong>{{ listing.title }}</strong>?
            This action cannot be undone.
          </p>
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2 px-4">Yes, Delete</button>
            <a href="{% url 'marketplace:listing_detail' listing.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
