{% load static %}
<div id="chatbot-container">
  <button id="chatbot-toggle" onclick="toggleChat()" title="chat with Diyah">
    <span id="chat-icon">💬</span>
    <span id="close-icon" style="display:none;">✕</span>
    <span id="chat-badge" style="display:none;">1</span>
  </button>
  <div id="chatbot-panel" style="display:none;">
    <div id="chatbot-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="bot-avatar">AI</div>
        <div>
          <div style="font-weight:600;font-size:14px;">Diyah</div>
          <div style="font-size:11px;opacity:0.8;">● Online —  Diyah is here to help</div>
        </div>
      </div>
      <button onclick="toggleChat()" id="header-close">✕</button>
    </div>
    <div id="chatbot-messages">
      <div class="bot-msg">
        <div class="bot-bubble">
          👋 Hi! I'm Diyah, your Student Economy Platform assistant.<br><br><br><br>
          I can help you with:
          <ul style="margin:6px 0 0 16px;padding:0;">
            <li>How the platform works</li>
            <li>Marketplace & Skills questions</li>
            <li>Subscription & payments</li>
            <li>Raising a support ticket</li>
          </ul>
          <br>What can I help you with today?
        </div>
      </div>
    </div>
    <div id="chatbot-typing" style="display:none;">
      <div class="bot-msg">
        <div class="bot-bubble typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <div id="chatbot-input-area">
      <input type="text" id="chatbot-input" placeholder="Type your message..."
        onkeypress="if(event.key==='Enter') sendChatMessage()" autocomplete="off"/>
      <button onclick="sendChatMessage()" id="send-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<style>
#chatbot-container { position:fixed;bottom:24px;right:24px;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
#chatbot-toggle { width:56px;height:56px;border-radius:50%;background:#0d6efd;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(13,110,253,0.4);font-size:22px;display:flex;align-items:center;justify-content:center;position:relative;transition:transform 0.2s;margin-left:auto; }
#chatbot-toggle:hover { transform:scale(1.08); }
#chat-badge { position:absolute;top:-4px;right:-4px;background:#dc3545;color:white;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid white; }
#chatbot-panel { position:absolute;bottom:68px;right:0;width:340px;height:480px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:flex;flex-direction:column;overflow:hidden;animation:slideUp 0.25s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
#chatbot-header { background:#0d6efd;color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
#bot-avatar { width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700; }
#header-close { background:none;border:none;color:white;font-size:16px;cursor:pointer;opacity:0.8;padding:4px; }
#header-close:hover { opacity:1; }
#chatbot-messages { flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;background:#f8f9fa; }
#chatbot-messages::-webkit-scrollbar { width:4px; }
#chatbot-messages::-webkit-scrollbar-thumb { background:#dee2e6;border-radius:4px; }
.bot-msg { display:flex;justify-content:flex-start; }
.user-msg { display:flex;justify-content:flex-end; }
.bot-bubble { background:#fff;border:1px solid #e9ecef;color:#212529;padding:10px 13px;border-radius:4px 14px 14px 14px;font-size:13px;line-height:1.5;max-width:85%; }
.user-bubble { background:#0d6efd;color:#fff;padding:10px 13px;border-radius:14px 4px 14px 14px;font-size:13px;line-height:1.5;max-width:85%; }
.typing-dots { display:flex;gap:4px;align-items:center;padding:6px 4px; }
.typing-dots span { width:7px;height:7px;background:#adb5bd;border-radius:50%;animation:bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay:0.2s; }
.typing-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
#chatbot-input-area { display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid #e9ecef;background:#fff;flex-shrink:0; }
#chatbot-input { flex:1;border:1px solid #dee2e6;border-radius:20px;padding:8px 14px;font-size:13px;outline:none;background:#f8f9fa;transition:border-color 0.15s; }
#chatbot-input:focus { border-color:#0d6efd;background:#fff; }
#send-btn { width:36px;height:36px;border-radius:50%;background:#0d6efd;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0; }
#send-btn:hover { background:#0b5ed7; }
#send-btn:disabled { background:#adb5bd;cursor:not-allowed; }
@media(max-width:480px) { #chatbot-panel{width:calc(100vw - 24px);right:-12px;height:420px;} #chatbot-container{bottom:16px;right:16px;} }
</style>

<script>
let chatOpen = false, ws = null, currentBubble = null, wsConnected = false;
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatbot-panel').style.display = chatOpen ? 'flex' : 'none';
  document.getElementById('chat-icon').style.display = chatOpen ? 'none' : 'block';
  document.getElementById('close-icon').style.display = chatOpen ? 'block' : 'none';
  document.getElementById('chat-badge').style.display = 'none';
  if (chatOpen && !wsConnected) { connectWebSocket(); setTimeout(() => document.getElementById('chatbot-input').focus(), 100); }
}
function connectWebSocket() {
  const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${protocol}://${window.location.host}/ws/chatbot/`);
  ws.onopen = () => { wsConnected = true; };
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    document.getElementById('chatbot-typing').style.display = 'none';
    if (data.type === 'stream') {
      if (!currentBubble) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'bot-msg';
        currentBubble = document.createElement('div');
        currentBubble.className = 'bot-bubble';
        msgDiv.appendChild(currentBubble);
        document.getElementById('chatbot-messages').appendChild(msgDiv);
      }
      currentBubble.textContent += data.chunk;
      scrollToBottom();
    } else if (data.type === 'end') {
      currentBubble = null;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('chatbot-input').disabled = false;
      document.getElementById('chatbot-input').focus();
    }
  };
  ws.onclose = () => { wsConnected = false; ws = null; };
  ws.onerror = () => { showBotMessage("Sorry, I'm having connection issues. Please refresh and try again."); };
}
function sendChatMessage() {
  const input = document.getElementById('chatbot-input');
  const message = input.value.trim();
  if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;
  const msgDiv = document.createElement('div');
  msgDiv.className = 'user-msg';
  const bubble = document.createElement('div');
  bubble.className = 'user-bubble';
  bubble.textContent = message;
  msgDiv.appendChild(bubble);
  document.getElementById('chatbot-messages').appendChild(msgDiv);
  input.value = '';
  input.disabled = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('chatbot-typing').style.display = 'flex';
  scrollToBottom();
  ws.send(JSON.stringify({ message }));
}
function showBotMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'bot-msg';
  const bubble = document.createElement('div');
  bubble.className = 'bot-bubble';
  bubble.textContent = text;
  msgDiv.appendChild(bubble);
  document.getElementById('chatbot-messages').appendChild(msgDiv);
  scrollToBottom();
}
function scrollToBottom() {
  const msgs = document.getElementById('chatbot-messages');
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
